name: Deploy to AWS S3 and CloudFront

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
      
      - name: Sync files to S3
        run: |
          aws s3 sync dist/ s3://isaac-cabrera-portfolio \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "*.txt" \
            --exclude "*.xml"
          
          # HTML files with no-cache for immediate updates
          aws s3 sync dist/ s3://isaac-cabrera-portfolio \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --include "*.txt" \
            --include "*.xml" \
            --cache-control "public,max-age=0,must-revalidate"
      
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E34Z96GLOCBRS4 \
            --paths "/*"
      
      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "🌐 Portfolio URLs:"
          echo "  Custom Domain: https://icabrera-portfolio.com"
          echo "  CloudFront: https://d1brxm97sxg46g.cloudfront.net"
          echo ""
          echo "⏰ Changes may take 1-5 minutes to propagate through CloudFront"
